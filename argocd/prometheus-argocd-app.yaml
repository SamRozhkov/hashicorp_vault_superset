# ArgoCD Application for Prometheus + Grafana + Alertmanager stack
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "55.0.0"
      helm:
        releaseName: prometheus
        values: |
          crds:
            enabled: false
          prometheus:
            prometheusSpec:
              secrets:
                - vault-metrics-token
              retention: 15d
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 50Gi
              additionalScrapeConfigs:
                - job_name: 'vault'
                  metrics_path: '/v1/sys/metrics'
                  params:
                    format: ['prometheus']
                  bearer_token_file: /etc/prometheus/secrets/vault-metrics-token/token
                  static_configs:
                    - targets: ['vault.vault.svc.cluster.local:8200']
  
          grafana:
            adminPassword: 'admin'
            persistence:
              enabled: true
              size: 10Gi
            datasources:
              datasources.yaml:
                apiVersion: 1
                datasources:
                  - name: Prometheus
                    type: prometheus
                    url: http://prometheus-kube-prometheus-prometheus:9090
  
          alertmanager:
            alertmanagerSpec:
              storage:
                volumeClaimTemplate:
                  spec:
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 2Gi
            config:
              global:
                resolve_timeout: 5m
              route:
                group_by: ['alertname', 'cluster', 'service']
                group_wait: 10s
                group_interval: 10s
                repeat_interval: 12h
                receiver: 'slack'
                routes:
                  - match:
                      severity: critical
                    receiver: 'slack-critical'
              receivers:
                - name: 'slack'
                  slack_configs:
                    - api_url: 'YOUR_SLACK_WEBHOOK_URL'
                      channel: '#monitoring'
                      title: '{{ .GroupLabels.alertname }}'
                      text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
                - name: 'slack-critical'
                  slack_configs:
                    - api_url: 'YOUR_SLACK_WEBHOOK_URL'
                      channel: '#alerts-critical'
                      title: 'CRITICAL: {{ .GroupLabels.alertname }}'
                      text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    - repoURL: https://github.com/SamRozhkov/hashicorp_vault_superset.git
      targetRevision: main
      path: monitoring
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
