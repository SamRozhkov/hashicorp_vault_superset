apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
spec:
  project: default
  destination:
    namespace: airflow
    server: https://kubernetes.default.svc
  sources:
    - repoURL: https://airflow.apache.org
      chart: airflow
      targetRevision: 1.22.0
      helm:
        valueFiles:
          - $values/airflow/values.yaml
    - repoURL: https://github.com/SamRozhkov/hashicorp_vault_superset.git
      targetRevision: main
      path: airflow
      ref: values
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      enabled: true
    syncOptions:
      - CreateNamespace=true
